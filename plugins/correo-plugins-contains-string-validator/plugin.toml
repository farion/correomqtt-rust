manifest_version = 1
id = "org.correomqtt.plugins.contains-string-validator"
name = "Contains String Validator"
version = "0.1.0"
description = "Validates message payload text by checking for configured text."
provider = "CorreoMQTT"
license = "GPL-3.0-or-later"
compatible_correomqtt = ">=0.1.0, <1.0.0"

[capabilities]
hooks = ["message_validator"]

[capabilities.host]
filesystem = false
network = false
secrets = false
mqtt = false

[[entrypoints]]
hook = "message_validator"
export = "correo_message_validator"

[config_schema]
schema_version = 1

[config_schema.document]
type = "object"
required = ["text"]
additionalProperties = false

[config_schema.document.properties.text]
type = "string"

[config_schema.document.properties.case_sensitive]
type = "boolean"
default = true
