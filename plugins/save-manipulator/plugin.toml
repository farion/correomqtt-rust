manifest_version = 1
id = "org.correomqtt.plugins.save-manipulator"
name = "Save Manipulator"
version = "0.1.0"
description = "Requests that CorreoMQTT save the selected message payload."
provider = "CorreoMQTT"
license = "GPL-3.0-or-later"
compatible_correomqtt = ">=0.1.0, <1.0.0"

[capabilities]
hooks = ["detail_byte_transform"]

[capabilities.host]
message_save = true

[[entrypoints]]
hook = "detail_byte_transform"
export = "correo_detail_byte_transform"

[config_schema]
schema_version = 1
document = { type = "object", additionalProperties = false }

