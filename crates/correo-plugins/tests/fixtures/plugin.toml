manifest_version = 1
id = "org.correomqtt.plugins.sample"
name = "Sample WASM Plugin"
version = "0.1.0"
description = "Synthetic plugin manifest used by Rust fixture tests."
provider = "CorreoMQTT"
license = "GPL-3.0-or-later"
compatible_correomqtt = ">=0.1.0, <1.0.0"

[capabilities]
hooks = [
    "outgoing_message_transform",
    "incoming_message_transform",
    "detail_formatter",
]

[capabilities.host]
filesystem = false
network = false
secrets = false
mqtt = false

[[entrypoints]]
hook = "outgoing_message_transform"
export = "correo_outgoing_transform"

[[entrypoints]]
hook = "incoming_message_transform"
export = "correo_incoming_transform"

[[entrypoints]]
hook = "detail_formatter"
export = "correo_detail_formatter"

[config_schema]
schema_version = 1
document = { type = "object", additionalProperties = false }
