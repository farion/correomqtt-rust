name: Rust Desktop Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Packaging automation tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: |
          rustup show active-toolchain
          rustc -vV
          cargo --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-check-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-check-

      - name: Verify lockfile
        run: cargo fetch --locked

      - name: Test packaging automation
        run: cargo test --locked -p xtask

  package:
    name: Package ${{ matrix.platform }} (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: correomqtt-linux-x86_64-unsigned-beta
          - platform: windows
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: correomqtt-windows-x86_64-unsigned-beta
          - platform: macos
            runner: macos-15
            target: aarch64-apple-darwin
            artifact: correomqtt-macos-aarch64-unsigned-beta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Show package provenance
        run: |
          echo "commit=${{ github.sha }}"
          echo "runner=${{ matrix.runner }}"
          echo "target=${{ matrix.target }}"
          echo "command=cargo xtask package-smoke --target ${{ matrix.target }} --out-dir dist/beta/${{ matrix.target }}"
          rustup show active-toolchain
          rustc -vV
          cargo --version

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-

      - name: Verify target lockfile
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Build and verify unsigned beta package
        run: cargo xtask package-smoke --target ${{ matrix.target }} --out-dir dist/beta/${{ matrix.target }}

      - name: List package outputs
        run: ls dist/beta/${{ matrix.target }}

      - name: Upload unsigned beta package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/beta/${{ matrix.target }}/*.zip
            dist/beta/${{ matrix.target }}/*.zip.sha256
            dist/beta/${{ matrix.target }}/SHA256SUMS

  plugin-release:
    name: Plugin release artifacts
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show plugin release provenance
        run: |
          echo "commit=${{ github.sha }}"
          echo "tag=${{ github.ref_name }}"
          echo "command=cargo xtask plugin-release --out-dir dist/plugins --asset-base-url https://github.com/EXXETA/correomqtt/releases/download/latest"
          rustup show active-toolchain
          rustc -vV
          cargo --version

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-plugins-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-plugins-

      - name: Verify plugin target lockfile
        run: cargo fetch --locked --target wasm32-unknown-unknown

      - name: Build plugin release artifacts
        run: cargo xtask plugin-release --out-dir dist/plugins --asset-base-url https://github.com/EXXETA/correomqtt/releases/download/latest

      - name: List plugin outputs
        run: ls dist/plugins

      - name: Upload plugin release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: correomqtt-plugin-release-artifacts
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/plugins/*.zip
            dist/plugins/default-repo.json
